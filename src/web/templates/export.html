{% extends "base.html" %}
{% block title %}导出聊天记录 — WeChat EXP{% endblock %}
{% block content %}
<a href="/" class="back-link">← 返回仪表盘</a>
<h2 style="margin:0 0 4px 0">📤 导出聊天记录</h2>
<p style="color:#8b949e;font-size:12px;margin:0 0 20px 0">按联系人或全量导出聊天记录为 TXT/HTML</p>

<div class="config-panel">
  <div class="form-row">
    <div style="flex:1"><label>导出范围</label>
      <select id="cfg-mode" style="width:100%;padding:8px 10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:13px">
        <option value="single">单个联系人/群聊</option>
        <option value="all">全部联系人/群聊</option>
      </select>
    </div>
    <div style="flex:1"><label>开始日期</label><input id="cfg-start" type="date"></div>
    <div style="flex:1"><label>结束日期</label><input id="cfg-end" type="date"></div>
    <div style="flex:1"><label>格式</label><select id="cfg-format"><option value="txt">TXT 文本</option><option value="html">HTML</option></select></div>
    <div><label>&nbsp;</label><button id="btn-run" class="btn btn-primary">开始导出</button></div>
  </div>
  <div class="form-row" id="single-contact-row" style="margin-top:8px">
    <div style="flex:2"><label>联系人/群聊标识</label><input id="cfg-contact" placeholder="例如: wxid_abc123 或 张三"></div>
  </div>
  <div class="form-row" id="all-export-options" style="display:none;margin-top:8px;align-items:center">
    <div style="flex:1">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:#c9d1d9;font-size:13px">
        <input id="cfg-skip-groups" type="checkbox" checked style="width:16px;height:16px">
        跳过群聊（仅导出私聊）
      </label>
    </div>
  </div>
  <div id="all-export-hint" style="display:none;margin-top:8px;padding:10px 14px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#8b949e;font-size:12px;line-height:1.6">
    将全部聊天导出为独立文件并打包为 ZIP 下载。勾选「跳过群聊」则只导出私聊。日期留空表示导出全部历史消息。
  </div>
</div>

<div id="progress-container" class="progress-panel" style="display:none">
  <div class="progress-bar-outer"><div id="progress-bar" class="progress-bar-inner" style="width:0%"></div></div>
  <div id="progress-detail" class="progress-detail">等待开始...</div>
  <div id="log-console" class="log-console" style="margin-top:12px"></div>
</div>

<div id="result-container" class="result-panel" style="display:none">
  <h3>✓ 导出完成</h3>
  <div id="result-content"></div>
</div>

<div id="select-container" class="select-container" style="display:none"></div>

<style>
.select-container {
  background: #16213e;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
  max-width: 600px;
}
.select-list { display: flex; flex-direction: column; gap: 8px; }
.select-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; background: #1a1a2e; border: 1px solid #30363d;
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
}
.select-item:hover { background: #0f3460; border-color: #e94560; }
.select-name { color: #eee; font-size: 15px; font-weight: 500; }
.select-count { color: #8b949e; font-size: 12px; }
</style>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/sse_progress.js') }}"></script>
<script src="{{ url_for('static', filename='js/wizard.js') }}"></script>
<script>
const modeSelect = document.getElementById('cfg-mode');
const singleRow = document.getElementById('single-contact-row');
const allOptions = document.getElementById('all-export-options');
const allHint = document.getElementById('all-export-hint');
const runBtn = document.getElementById('btn-run');

function updateExportMode() {
  const isAll = modeSelect.value === 'all';
  singleRow.style.display = isAll ? 'none' : 'flex';
  allOptions.style.display = isAll ? 'flex' : 'none';
  allHint.style.display = isAll ? 'block' : 'none';
  runBtn.textContent = isAll ? '开始全量导出' : '开始导出';
}
modeSelect.addEventListener('change', updateExportMode);
updateExportMode();

new WizardPage({
  runBtnId: 'btn-run',
  apiUrl: '/api/export/chat',
  getApiUrl: () => modeSelect.value === 'all' ? '/api/export/chat-all' : '/api/export/chat',
  steps: ['export'],
  chatFieldId: 'cfg-contact',
  getBody: () => ({
    contact: document.getElementById('cfg-contact').value,
    date_start: document.getElementById('cfg-start').value,
    date_end: document.getElementById('cfg-end').value,
    format: document.getElementById('cfg-format').value,
    skip_groups: document.getElementById('cfg-skip-groups').checked,
  }),
});
</script>
{% endblock %}
